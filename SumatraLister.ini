; SumatraLister.ini
; Place this file next to SumatraLister.wlx / SumatraLister.wlx64.
; It is entirely optional — with no INI present, the plugin auto-detects
; SumatraPDF and uses its normal defaults.

[Settings]

; Manual path to SumatraPDF.exe. Leave blank to auto-detect (registry,
; common install folders, the plugin's own folder, then PATH).
SumatraPath=

; Extra command-line arguments appended verbatim to every Sumatra launch.
; See `SumatraPDF.exe -h` for the full list supported by your version.
ExtraArgs=

; 1 = launch with -restrict (disables editing, printing, and disk/clipboard
; access in the document — useful when previewing files from untrusted
; sources). 0 = normal mode.
RestrictMode=0

; 1 = launch with -invertcolors for a dark/night reading mode. 0 = normal.
; Ignored if AutoNightMode=1.
NightMode=0

; 1 = automatically match Total Commander's own Lister dark-mode setting
; instead of a fixed NightMode= value. Total Commander notifies plugins of
; dark-mode state via its real LC_NEWPARAMS mechanism (the LCP_DARKMODE /
; LCP_DARKMODENATIVE flags), which this plugin uses to decide whether to
; relaunch Sumatra with -invertcolors.
AutoNightMode=0

; Default zoom passed via -zoom, e.g.: fit page | fit width | fit content | 100
DefaultZoom=

; Default view mode passed via -view, e.g.: continuous | single page | facing | book view
DefaultView=

; Page-surround background color passed via -bg-color, as a hex RGB value
; (e.g. "2B2B2B" for a dark gray). This is the color of the area AROUND the
; page in continuous-scroll mode, distinct from NightMode/-invertcolors
; (which inverts the page/text content itself). Useful for matching
; Sumatra's surrounding chrome to Total Commander's own theme. Leave blank
; for Sumatra's own default.
BackgroundColor=

; Comma-separated allowlist of extensions this plugin should claim, e.g.
; "PDF,EPUB,CBZ". Leave blank (default) to keep every extension it
; supports enabled -- this only lets you TRIM the list (e.g. to exclude
; CHM) without recompiling; it can't add extensions Sumatra itself can't open.
EnabledExtensions=

; Extra arguments forwarded to -print-settings when printing via this
; plugin's ListPrint support (Total Commander's File > Print on a selected
; file), e.g.: fit | noscale | shrink | landscape | duplex
PrintSettings=

; Controls ListPrint's FALLBACK behavior -- used only when there's no live
; Lister pane already showing the file being printed (the common case
; instead reuses that pane's own Ctrl+P print dialog; see the README).
; 1 = show Sumatra's own interactive print dialog (printer/page-range/
;     copies choice) for the fallback case too; the plugin returns right
;     away rather than waiting for you to finish with it (default).
; 0 = the old silent, non-interactive behavior (-print-to/-print-to-default),
;     which briefly waits for the job to finish before returning -- for
;     scripted/automated printing that can't have a dialog pop up unattended.
InteractivePrintFallback=1

; 1 = supply file-list thumbnails (Total Commander's Thumbnails view) using
; the Windows Shell thumbnail pipeline. 0 = disable (blank/generic icons).
ThumbnailsEnabled=1

; How long (milliseconds) to wait for SumatraPDF to embed itself after being
; launched before giving up and showing the error/fallback pane. Clamped to
; 500-30000. Raise this on slow machines or network-mounted Sumatra installs
; if you see "could not be found or started" despite Sumatra being present.
EmbedTimeoutMs=4000

; 1 = if Sumatra can't be found or fails to embed, open the file with its
; default Windows application instead (as a separate window; it can't be
; embedded into the Lister pane the way Sumatra's -plugin mode can).
; 0 = just show an explanatory message in the Lister pane (default).
FallbackToShellOpen=0

; 1 = register Ctrl+Alt+O as a hotkey (active for as long as any Lister pane
; using this plugin is open) that reopens the current file in a normal, full
; SumatraPDF window with its menu/toolbar -- useful for Save As, annotating,
; rotating, or anything else the embedded view doesn't expose.
; 0 = disabled (default). NOTE: this hotkey is effectively system-wide while
; active, not scoped to just this preview having focus, so it can shadow the
; same combo in other applications -- opt in deliberately.
EnablePopOut=0

; 1 = register Ctrl+Alt+D (same system-wide scoping caveat as EnablePopOut
; above) to copy a diagnostic snapshot to the clipboard -- plugin version,
; detected Sumatra path, effective settings, and a recent log tail if
; DebugLog=1. Never includes a deep link's pwd or search value, even if one
; was used to open the current file. Handy for pasting into a bug report.
; 0 = disabled (default).
EnableDiagnosticHotkey=0

; 1 = write SumatraLister.log next to this INI with detection/launch details
; (useful for troubleshooting "Sumatra could not be found" messages). The
; log auto-rotates (starts fresh) once it passes ~2MB.
DebugLog=0

; ---------------------------------------------------------------------------
; Per-extension overrides (optional)
; ---------------------------------------------------------------------------
; An [EXT] section (extension name, no dot -- PDF, EPUB, CBZ, CBR, CB7, CBT,
; CHM, DJVU, FB2, FB2Z, MOBI, PRC, XPS, OXPS) overrides DefaultZoom/
; DefaultView/NightMode from [Settings] for files of that extension only.
; Any key you don't set here falls back to the [Settings] value above.
; Comics and PDFs, for example, often want different defaults:
;
; [CBZ]
; DefaultView=continuous
; DefaultZoom=fit width
;
; [CBR]
; DefaultView=continuous
; DefaultZoom=fit width
;
; [PDF]
; DefaultView=single page
; DefaultZoom=fit page

