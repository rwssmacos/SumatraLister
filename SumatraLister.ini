; SumatraLister.ini
; Place this file next to SumatraLister.wlx / SumatraLister.wlx64.
; It is entirely optional — with no INI present, the plugin auto-detects
; SumatraPDF and uses its normal defaults.

[Settings]

; Manual path to SumatraPDF.exe. Leave blank to auto-detect (registry,
; common install folders, the plugin's own folder, then PATH).
SumatraPath=

; Extra command-line arguments appended verbatim to every Sumatra launch.
; See `SumatraPDF.exe -h` for the full list supported by your version.
ExtraArgs=

; 1 = launch with -restrict (disables editing, printing, and disk/clipboard
; access in the document — useful when previewing files from untrusted
; sources). 0 = normal mode.
RestrictMode=0

; 1 = launch with -invertcolors for a dark/night reading mode. 0 = normal.
; Ignored if AutoNightMode=1.
NightMode=0

; 1 = automatically match Total Commander's own Lister background colour
; (light/dark) instead of a fixed NightMode= value. Total Commander reports
; its background colour to the plugin, which is used to decide whether to
; relaunch Sumatra with -invertcolors.
AutoNightMode=0

; Default zoom passed via -zoom, e.g.: fit page | fit width | fit content | 100
DefaultZoom=

; Default view mode passed via -view, e.g.: continuous | single page | facing | book view
DefaultView=

; Extra arguments forwarded to -print-settings when printing via this
; plugin's ListPrint support (Total Commander's File > Print on a selected
; file), e.g.: fit | noscale | shrink | landscape | duplex
PrintSettings=

; 1 = supply file-list thumbnails (Total Commander's Thumbnails view) using
; the Windows Shell thumbnail pipeline. 0 = disable (blank/generic icons).
ThumbnailsEnabled=1

; How long (milliseconds) to wait for SumatraPDF to embed itself after being
; launched before giving up and showing the error/fallback pane. Clamped to
; 500-30000. Raise this on slow machines or network-mounted Sumatra installs
; if you see "could not be found or started" despite Sumatra being present.
EmbedTimeoutMs=4000

; 1 = if Sumatra can't be found or fails to embed, open the file with its
; default Windows application instead (as a separate window; it can't be
; embedded into the Lister pane the way Sumatra's -plugin mode can).
; 0 = just show an explanatory message in the Lister pane (default).
FallbackToShellOpen=0

; 1 = register Ctrl+Alt+O as a hotkey (active for as long as any Lister pane
; using this plugin is open) that reopens the current file in a normal, full
; SumatraPDF window with its menu/toolbar -- useful for Save As, annotating,
; rotating, or anything else the embedded view doesn't expose.
; 0 = disabled (default). NOTE: this hotkey is effectively system-wide while
; active, not scoped to just this preview having focus, so it can shadow the
; same combo in other applications -- opt in deliberately.
EnablePopOut=0

; 1 = write SumatraLister.log next to this INI with detection/launch details
; (useful for troubleshooting "Sumatra could not be found" messages). The
; log auto-rotates (starts fresh) once it passes ~2MB.
DebugLog=0
